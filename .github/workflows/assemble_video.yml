name: Assemble Final Video

on:
  workflow_dispatch:
    inputs:
      target_duration:
        description: 'Target video duration in seconds (min 180 for monetization)'
        required: true
        default: '210'
      sa_living_ratio:
        description: 'Insert 1 SA Living clip every N filler clips'
        required: true
        default: '4'
      music_volume:
        description: 'Background music volume 0.0-1.0'
        required: true
        default: '0.15'
      min_views:
        description: 'Minimum views filter for Tier1 accounts'
        required: true
        default: '10000'
      clips_per_account:
        description: 'Max clips to pull per account'
        required: true
        default: '15'

jobs:
  assemble:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get install -y ffmpeg
          pip install yt-dlp gdown scenedetect[opencv]

      - name: Download amapiano from Google Drive
        run: |
          gdown "1OpuBLpiDokCBnU07sU_zGXBTSxNMc3Kg" -O music1.mp3 || echo "Track 1 failed"
          gdown "14aGhgjYdHgvdjBgHDJ63O3_SWpUTIxsa" -O music2.mp3 || echo "Track 2 failed"
          python3 -c "
          import random, os, shutil
          tracks = [f for f in ['music1.mp3','music2.mp3'] if os.path.exists(f) and os.path.getsize(f) > 100000]
          if tracks:
              shutil.copy(random.choice(tracks), 'music.mp3')
              print('Music ready')
          else:
              print('No music')
          "

      - name: Download Tier1 - SA Living reposts
        run: |
          mkdir -p content/tier1
          for account in funnycomedyscreen moment.later4.1 mfanakahtk.co.za sachoasvibes; do
            echo "=== @$account ==="
            mkdir -p "content/tier1/$account"
            yt-dlp \
              --match-filter "view_count>=${{ github.event.inputs.min_views }}" \
              --max-downloads "${{ github.event.inputs.clips_per_account }}" \
              --playlist-end "${{ github.event.inputs.clips_per_account }}" \
              -o "content/tier1/$account/%(id)s.%(ext)s" \
              --no-warnings --ignore-errors \
              "https://www.tiktok.com/@$account" || true
            echo "Got $(ls content/tier1/$account/*.mp4 2>/dev/null | wc -l) videos"
          done

      - name: Download Tier2 - Filler content
        run: |
          mkdir -p content/tier2
          for account in daily_sa_1 mzansimemes1 funnyorama fun.only52 available4.8 funny.clips.57; do
            echo "=== @$account ==="
            mkdir -p "content/tier2/$account"
            yt-dlp \
              --max-downloads "${{ github.event.inputs.clips_per_account }}" \
              --playlist-end "${{ github.event.inputs.clips_per_account }}" \
              -o "content/tier2/$account/%(id)s.%(ext)s" \
              --no-warnings --ignore-errors \
              "https://www.tiktok.com/@$account" || true
            echo "Got $(ls content/tier2/$account/*.mp4 2>/dev/null | wc -l) videos"
          done

      - name: Split Tier1 into scenes
        run: |
          mkdir -p content/tier1_scenes
          find content/tier1 -name "*.mp4" | while read video; do
            account=$(echo "$video" | cut -d'/' -f3)
            filename=$(basename "$video" .mp4)
            outdir="content/tier1_scenes/$account"
            mkdir -p "$outdir"
            python3 - <<EOF
          from scenedetect import open_video, SceneManager
          from scenedetect.detectors import ContentDetector
          from scenedetect.video_splitter import split_video_ffmpeg
          import shutil
          path, out, name = "$video", "$outdir", "$filename"
          try:
              v = open_video(path)
              sm = SceneManager()
              sm.add_detector(ContentDetector(threshold=27.0))
              sm.detect_scenes(v)
              scenes = sm.get_scene_list()
              if len(scenes) <= 1:
                  v = open_video(path)
                  sm = SceneManager()
                  sm.add_detector(ContentDetector(threshold=15.0))
                  sm.detect_scenes(v)
                  scenes = sm.get_scene_list()
              print(f"{name}: {len(scenes)} scenes")
              if len(scenes) > 1:
                  split_video_ffmpeg(path, scenes, output_dir=out, output_file_template=f"{name}_\$SCENE_NUMBER.mp4")
              else:
                  shutil.copy(path, f"{out}/{name}_full.mp4")
          except Exception as e:
              print(f"Error: {e}")
          EOF
          done

      - name: Build playlist and assemble
        run: |
          python3 - <<'EOF'
          import os, random, json, subprocess, shutil

          target_seconds = int("${{ github.event.inputs.target_duration }}")
          music_vol = float("${{ github.event.inputs.music_volume }}")
          ratio = int("${{ github.event.inputs.sa_living_ratio }}")
          has_music = os.path.exists("music.mp3") and os.path.getsize("music.mp3") > 100000

          tier1, tier2 = [], []
          for root, dirs, files in os.walk("content/tier1_scenes"):
              for f in files:
                  if f.endswith(".mp4"): tier1.append(os.path.join(root, f))
          for root, dirs, files in os.walk("content/tier2"):
              for f in files:
                  if f.endswith(".mp4"): tier2.append(os.path.join(root, f))

          random.shuffle(tier1); random.shuffle(tier2)
          print(f"Tier1: {len(tier1)} | Tier2: {len(tier2)}")

          source = tier2 if tier2 else tier1
          if not source:
              print("No content found"); exit(1)

          playlist = []
          t1_idx = t2_idx = 0
          while t2_idx < len(source):
              for i in range(ratio):
                  if t2_idx < len(source):
                      playlist.append(source[t2_idx]); t2_idx += 1
              if t1_idx < len(tier1):
                  playlist.append(tier1[t1_idx]); t1_idx += 1

          print(f"Playlist: {len(playlist)} clips")

          def get_streams(p):
              r = subprocess.run(["ffprobe","-v","quiet","-print_format","json","-show_streams",p],
                                 capture_output=True, text=True)
              try: return json.loads(r.stdout).get("streams", [])
              except: return []

          os.makedirs("processed", exist_ok=True)
          processed = []
          total_dur = 0.0

          for i, path in enumerate(playlist):
              if not os.path.exists(path): continue
              out = f"processed/clip_{i:04d}.mp4"

              streams = get_streams(path)
              has_audio = any(s.get("codec_type") == "audio" for s in streams)

              if not has_audio:
                  print(f"Skipping clip {i} - no audio")
                  continue

              try:
                  dur = float(next(s for s in streams if s.get("codec_type") == "video")["duration"])
              except:
                  dur = 5.0

              if dur < 2: continue
              d = round(dur, 2)

              vf = (
                  f"scale=1080:1920:force_original_aspect_ratio=decrease,"
                  f"pad=1080:1920:(ow-iw)/2:(oh-ih)/2:black,"
                  f"drawbox=x=0:y=0:w=1080:h=1920:color=yellow@0.9:t=8,"
                  f"drawbox=x=0:y=ih-8:w='min(iw*2*(t/{d}\\,1),iw)':h=8:color=yellow:t=fill:enable='lte(t,{d}/2)',"
                  f"drawbox=x='max(iw-iw*2*((t-{d}/2)/{d}\\,0),0)':y=0:w='min(iw*2*((t-{d}/2)/{d}\\,0),iw)':h=8:color=yellow:t=fill:enable='gt(t,{d}/2)'"
              )

              cmd = ["ffmpeg","-y","-i",path,
                     "-vf",vf,
                     "-c:v","libx264","-preset","fast","-crf","23",
                     "-c:a","aac","-ar","44100","-ac","2",
                     "-shortest", out]

              r = subprocess.run(cmd, capture_output=True, text=True)
              if r.returncode == 0 and os.path.exists(out):
                  processed.append(out)
                  total_dur += dur
                  print(f"[{i+1}] {dur:.1f}s | total={total_dur:.1f}s")
              else:
                  print(f"Failed {i}: {r.stderr[-100:]}")

              if total_dur >= target_seconds:
                  print(f"Reached {target_seconds}s"); break

          print(f"\n{len(processed)} clips | {total_dur:.1f}s")
          if not processed:
              print("Nothing processed"); exit(1)

          with open("concat_list.txt","w") as f:
              for p in processed: f.write(f"file '{p}'\n")

          subprocess.run([
              "ffmpeg","-y","-f","concat","-safe","0",
              "-i","concat_list.txt","-c","copy","combined.mp4"
          ], check=True)

          if has_music:
              r = subprocess.run([
                  "ffmpeg","-y","-i","combined.mp4",
                  "-stream_loop","-1","-i","music.mp3",
                  "-filter_complex",
                  f"[1:a]volume={music_vol}[m];[0:a][m]amix=inputs=2:duration=first[aout]",
                  "-map","0:v","-map","[aout]",
                  "-c:v","copy","-c:a","aac","-shortest","final_output.mp4"
              ], capture_output=True, text=True)
              if r.returncode != 0:
                  print(f"Music mix failed: {r.stderr[-200:]}")
                  shutil.copy("combined.mp4","final_output.mp4")
          else:
              shutil.copy("combined.mp4","final_output.mp4")

          print(f"Done: {os.path.getsize('final_output.mp4')/1024/1024:.1f}MB")
          EOF

      - name: Upload final video
        uses: actions/upload-artifact@v4
        with:
          name: final-video
          path: final_output.mp4
          retention-days: 7
