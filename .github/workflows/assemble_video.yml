name: Assemble Final Video

on:
  workflow_dispatch:
    inputs:
      target_duration:
        description: 'Target video duration in seconds (min 180 for monetization)'
        required: true
        default: '210'
      sa_living_ratio:
        description: 'Insert 1 SA Living clip every N filler clips (e.g. 4)'
        required: true
        default: '4'
      music_volume:
        description: 'Background music volume 0.0-1.0 (e.g. 0.15 for subtle)'
        required: true
        default: '0.15'

jobs:
  assemble:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get install -y ffmpeg
          pip install yt-dlp gdown

      - name: Download amapiano tracks from Google Drive
        run: |
          echo "Downloading music tracks..."

          # gdown handles Google Drive large file downloads reliably
          gdown "1OpuBLpiDokCBnU07sU_zGXBTSxNMc3Kg" -O music1.mp3 || \
            wget -q --no-check-certificate \
            "https://drive.google.com/uc?export=download&id=1OpuBLpiDokCBnU07sU_zGXBTSxNMc3Kg" \
            -O music1.mp3

          gdown "14aGhgjYdHgvdjBgHDJ63O3_SWpUTIxsa" -O music2.mp3 || \
            wget -q --no-check-certificate \
            "https://drive.google.com/uc?export=download&id=14aGhgjYdHgvdjBgHDJ63O3_SWpUTIxsa" \
            -O music2.mp3

          ls -lh music*.mp3 2>/dev/null || echo "Music download failed"

      - name: Pick music track randomly
        run: |
          python3 -c "
          import random, os
          tracks = [f for f in ['music1.mp3','music2.mp3'] if os.path.exists(f) and os.path.getsize(f) > 100000]
          if tracks:
              pick = random.choice(tracks)
              os.rename(pick, 'music.mp3')
              print(f'Using: {pick}')
          else:
              print('No valid music found')
          "

      - name: Collect and shuffle clips
        run: |
          python3 - <<'EOF'
          import os, random, json

          tier1 = []
          if os.path.exists("content/tier1_scenes"):
              for root, dirs, files in os.walk("content/tier1_scenes"):
                  for f in files:
                      if f.endswith(".mp4"):
                          tier1.append(os.path.join(root, f))

          tier2 = []
          if os.path.exists("content/tier2"):
              for root, dirs, files in os.walk("content/tier2"):
                  for f in files:
                      if f.endswith(".mp4"):
                          tier2.append(os.path.join(root, f))

          random.shuffle(tier1)
          random.shuffle(tier2)

          print(f"Tier1 (SA Living scenes): {len(tier1)}")
          print(f"Tier2 (Filler): {len(tier2)}")

          if not tier2:
              print("ERROR: No filler content found. Run sa_content_pipeline first.")
              exit(1)

          ratio = int("${{ github.event.inputs.sa_living_ratio }}")
          playlist = []
          t1_idx = 0
          t2_idx = 0

          while t2_idx < len(tier2):
              for i in range(ratio):
                  if t2_idx < len(tier2):
                      playlist.append({"path": tier2[t2_idx], "tier": "filler"})
                      t2_idx += 1
              if t1_idx < len(tier1):
                  playlist.append({"path": tier1[t1_idx], "tier": "sa_living"})
                  t1_idx += 1

          print(f"Playlist: {len(playlist)} clips")
          with open("playlist.json", "w") as f:
              json.dump(playlist, f, indent=2)
          EOF

      - name: Process clips and assemble
        run: |
          python3 - <<'EOF'
          import json, os, subprocess

          with open("playlist.json") as f:
              playlist = json.load(f)

          target_seconds = int("${{ github.event.inputs.target_duration }}")
          music_vol = float("${{ github.event.inputs.music_volume }}")
          has_music = os.path.exists("music.mp3") and os.path.getsize("music.mp3") > 100000

          os.makedirs("processed", exist_ok=True)
          processed = []
          total_duration = 0.0

          for i, clip in enumerate(playlist):
              path = clip["path"]
              out = f"processed/clip_{i:04d}.mp4"

              if not os.path.exists(path):
                  continue

              # Get duration
              result = subprocess.run([
                  "ffprobe", "-v", "quiet",
                  "-print_format", "json",
                  "-show_streams", path
              ], capture_output=True, text=True)

              try:
                  import json as j
                  info = j.loads(result.stdout)
                  duration = float(info["streams"][0].get("duration", 0))
              except:
                  duration = 5.0

              if duration < 2:
                  continue

              dur = round(duration, 2)

              # Scale to vertical + animated yellow border (bottom-left to top-right)
              vf = (
                  "scale=1080:1920:force_original_aspect_ratio=decrease,"
                  "pad=1080:1920:(ow-iw)/2:(oh-ih)/2:black,"
                  f"drawbox=x=0:y=0:w=1080:h=1920:color=yellow@0.9:t=8,"
                  # Bottom edge fills left to right in first half
                  f"drawbox=x=0:y=ih-8:w='min(iw*2*(t/{dur}\\,1),iw)':h=8:color=yellow:t=fill:enable='lte(t,{dur}/2)',"
                  # Top edge fills right to left in second half  
                  f"drawbox=x='max(iw-iw*2*((t-{dur}/2)/{dur}\\,0),0)':y=0:w='min(iw*2*((t-{dur}/2)/{dur}\\,0),iw)':h=8:color=yellow:t=fill:enable='gt(t,{dur}/2)'"
              )

              cmd = [
                  "ffmpeg", "-y", "-i", path,
                  "-vf", vf,
                  "-c:v", "libx264",
                  "-preset", "fast",
                  "-crf", "23",
                  "-c:a", "aac",
                  "-ar", "44100",
                  "-shortest",
                  out
              ]

              result = subprocess.run(cmd, capture_output=True, text=True)
              if result.returncode == 0 and os.path.exists(out):
                  processed.append(out)
                  total_duration += duration
                  print(f"[{i+1}/{len(playlist)}] {clip['tier']} | {duration:.1f}s | total={total_duration:.1f}s")
              else:
                  print(f"Failed clip {i}: {result.stderr[-150:]}")

              if total_duration >= target_seconds:
                  print(f"Reached target {target_seconds}s")
                  break

          print(f"\nProcessed {len(processed)} clips | {total_duration:.1f}s total")

          # Concatenate
          with open("concat_list.txt", "w") as f:
              for p in processed:
                  f.write(f"file '{p}'\n")

          subprocess.run([
              "ffmpeg", "-y",
              "-f", "concat", "-safe", "0",
              "-i", "concat_list.txt",
              "-c", "copy",
              "combined.mp4"
          ], check=True)

          # Mix music
          if has_music:
              result = subprocess.run([
                  "ffmpeg", "-y",
                  "-i", "combined.mp4",
                  "-stream_loop", "-1",
                  "-i", "music.mp3",
                  "-filter_complex",
                  f"[1:a]volume={music_vol}[music];[0:a][music]amix=inputs=2:duration=first:dropout_transition=2[aout]",
                  "-map", "0:v",
                  "-map", "[aout]",
                  "-c:v", "copy",
                  "-c:a", "aac",
                  "-shortest",
                  "final_output.mp4"
              ], capture_output=True, text=True)

              if result.returncode == 0:
                  print("Music mixed successfully")
              else:
                  print(f"Music mix failed: {result.stderr[-200:]}")
                  os.rename("combined.mp4", "final_output.mp4")
          else:
              print("No music — skipping mix")
              os.rename("combined.mp4", "final_output.mp4")

          size = os.path.getsize("final_output.mp4") / (1024*1024)
          print(f"\nDone: final_output.mp4 ({size:.1f}MB)")
          EOF

      - name: Upload final video
        uses: actions/upload-artifact@v4
        with:
          name: final-video
          path: final_output.mp4
          retention-days: 7
