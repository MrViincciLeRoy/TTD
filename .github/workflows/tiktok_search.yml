name: TikTok Search Download

on:
  workflow_dispatch:
    inputs:
      search_term:
        description: 'Hashtag to search (without #)'
        required: true
        default: 'southafricanliving'
      max_videos:
        description: 'Max number of videos to download'
        required: true
        default: '10'

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install TikTokApi yt-dlp
          playwright install webkit
          playwright install-deps webkit

      - name: Search and collect video URLs
        run: |
          python3 - <<'EOF'
          import asyncio
          from TikTokApi import TikTokApi

          search_term = "${{ github.event.inputs.search_term }}"
          max_videos = int("${{ github.event.inputs.max_videos }}")

          async def get_videos():
              urls = []
              async with TikTokApi() as api:
                  await api.create_sessions(
                      ms_tokens=[None],
                      num_sessions=1,
                      sleep_after=5,
                      headless=True,
                      browser="webkit"
                  )
                  try:
                      async for video in api.hashtag(name=search_term).videos(count=max_videos):
                          url = f"https://www.tiktok.com/@{video.author.username}/video/{video.id}"
                          urls.append(url)
                          print(f"Found: {url}")
                  except Exception as e:
                      print(f"Hashtag fetch error: {e}")

              with open("urls.txt", "w") as f:
                  f.write("\n".join(urls))
              print(f"Total: {len(urls)} videos found")

          asyncio.run(get_videos())
          EOF

      - name: Show collected URLs
        run: cat urls.txt || echo "urls.txt empty"

      - name: Download videos
        run: |
          mkdir -p output
          if [ ! -s urls.txt ]; then
            echo "No URLs to download"
            exit 0
          fi
          while IFS= read -r url; do
            echo "Downloading: $url"
            yt-dlp -o "output/%(uploader)s_%(id)s.%(ext)s" "$url" || echo "Failed: $url"
          done < urls.txt

      - name: Zip videos
        run: |
          cd output
          zip -r ../tiktok_videos.zip . 2>/dev/null || echo "Nothing to zip"
          cd ..
          ls -lh tiktok_videos.zip 2>/dev/null || echo "Zip not created"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiktok-videos
          path: tiktok_videos.zip
          retention-days: 7
